<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>

    <div class="d-flex vh-100 justify-content-center align-items-center">
        <div class="card" style="width: 18rem;">
            <div class="card-body container-fluid">
                <div class="row">
                    <div class="col-12 m-3">
                        <h2 class="text-center">Cadastro</h2>
                    </div>
                    <div class="form-floating col-12 p-0 m-3">
                        <label for="nome" class="form-label">Nome</label>
                        <input type="text" name="nome" id="nome" class="form-control">
                    </div>
                    <div class="form-floating col-12 p-0 m-3">
                        <label for="email" class="form-label">E-mail</label>
                        <input type="email" name="email" id="email" class="form-control">
                    </div>
                    <div class="form-floating col-md-6 p-0 m-3">
                        <label for="senha" class="form-label">Senha</label>
                        <input type="password" name="senha" id="senha" class="form-control">
                    </div>
                    <div class="form-floating col-md-6 p-0 m-3">
                        <label for="vef-senha" class="form-label">Verificar senha</label>
                        <input type="password" name="vef-senha" id="vef-senha" class="form-control">
                    </div>
                    <div class="col-12 text-center"><input type="submit" value="Cadastrar" class="btn btn-primary mt-3"></div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
